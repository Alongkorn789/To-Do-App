<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - TaskFlow</title>
  <meta name="description" content="เข้าสู่ระบบหรือลงทะเบียนเพื่อจัดการงานของคุณด้วย TaskFlow">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols (Icons) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Style Sheet -->
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body class="auth-page">
  <script>
    // Apply cached theme synchronously before first paint to prevent dark/light flash
    (function() {
      const cachedTheme = localStorage.getItem('theme') || 'dark';
      if (cachedTheme === 'light') {
        document.body.classList.add('light-mode');
      }
    })();
  </script>
  <div class="auth-bg-glow"></div>
  <div class="auth-bg-glow secondary"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <span class="material-symbols-outlined logo-icon">task_alt</span>
          <h2>TaskFlow</h2>
        </div>
        <p class="auth-subtitle">ระบบจัดการงานอัจฉริยะด้วย AI</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tab-login" data-tab="login">เข้าสู่ระบบ</button>
        <button class="auth-tab-btn" id="tab-register" data-tab="register">ลงทะเบียน</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="auth-form active">
        <div class="form-group">
          <label for="login-username">ชื่อผู้ใช้</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">person</span>
            <input type="text" id="login-username" placeholder="กรอกชื่อผู้ใช้ของคุณ" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">รหัสผ่าน</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="login-password" placeholder="กรอกรหัสผ่านของคุณ" required autocomplete="current-password">
          </div>
        </div>

        <div class="auth-error-message" id="login-error"></div>

        <button type="submit" class="btn-auth-submit" id="btn-login-submit">
          <span class="btn-text">เข้าสู่ระบบ</span>
          <span class="spinner" style="display: none;"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="form-register" class="auth-form">
        <div class="form-group">
          <label for="register-username">ชื่อผู้ใช้</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">person</span>
            <input type="text" id="register-username" placeholder="ภาษาอังกฤษหรือตัวเลขอย่างน้อย 3 ตัว" required minlength="3" autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="register-email">อีเมล</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">mail</span>
            <input type="email" id="register-email" placeholder="ตัวอย่าง: user@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="register-password">รหัสผ่าน</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="register-password" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6" autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label for="register-confirm-password">ยืนยันรหัสผ่าน</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="register-confirm-password" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="6" autocomplete="new-password">
          </div>
        </div>

        <div class="auth-error-message" id="register-error"></div>

        <button type="submit" class="btn-auth-submit" id="btn-register-submit">
          <span class="btn-text">ลงทะเบียนและเริ่มต้นใช้งาน</span>
          <span class="spinner" style="display: none;"></span>
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { storage } from './src/js/storage.js';

    // Check if user is already logged in
    async function checkAuthOnLoad() {
      try {
        const user = await storage.checkSession();
        if (user) {
          window.location.href = '/index.html';
        }
      } catch (err) {
        // Not authenticated, do nothing
      }
    }

    // Toggle forms
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const formLogin = document.getElementById('form-login');
    const formRegister = document.getElementById('form-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.classList.add('active');
      formRegister.classList.remove('active');
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formRegister.classList.add('active');
      formLogin.classList.remove('active');
    });

    // Handle Login Submit
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      const submitBtn = document.getElementById('btn-login-submit');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = submitBtn.querySelector('.spinner');

      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
      
      // Loading state
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      submitBtn.disabled = true;

      try {
        await storage.login(username, password);
        showToast('เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับ', 'success');
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1000);
      } catch (err) {
        errorDiv.textContent = err.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
        errorDiv.style.display = 'block';
        // Reset button
        btnText.style.display = 'inline-block';
        spinner.style.display = 'none';
        submitBtn.disabled = false;
      }
    });

    // Handle Register Submit
    formRegister.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirmPassword = document.getElementById('register-confirm-password').value;
      const errorDiv = document.getElementById('register-error');
      const submitBtn = document.getElementById('btn-register-submit');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = submitBtn.querySelector('.spinner');

      errorDiv.style.display = 'none';
      errorDiv.textContent = '';

      if (password !== confirmPassword) {
        errorDiv.textContent = 'รหัสผ่านไม่ตรงกัน';
        errorDiv.style.display = 'block';
        return;
      }

      // Loading state
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      submitBtn.disabled = true;

      try {
        await storage.register(username, email, password);
        showToast('ลงทะเบียนสำเร็จ! กำลังเตรียมข้อมูลสำหรับคุณ...', 'success');
        
        // Auto login
        await storage.login(username, password);
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1500);
      } catch (err) {
        errorDiv.textContent = err.message || 'เกิดข้อผิดพลาดในการลงทะเบียน';
        errorDiv.style.display = 'block';
        // Reset button
        btnText.style.display = 'inline-block';
        spinner.style.display = 'none';
        submitBtn.disabled = false;
      }
    });

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span class="material-symbols-outlined toast-icon">
          ${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}
        </span>
        <span class="toast-message">${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('show');
      }, 50);

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Run check session on load
    checkAuthOnLoad();
  </script>
</body>
</html>
