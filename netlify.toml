# ============================================================
# API Proxy — forward ALL /api/* calls to Render backend
# ONE rule handles everything: tasks, categories, theme, auth
# ============================================================

[[redirects]]
  from = "/api/*"
  to = "https://to-do-app-pc0y.onrender.com/api/:splat"
  status = 200
  force = true

# ============================================================
# SPA Fallback — must be LAST
# login.html is a real static file → served directly before this rule
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200